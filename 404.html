<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada (404) - Aquatronic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/styles/404.css">
</head>
<body>
    <site-header></site-header>
    
    <main id="app">
        <section class="error-section container">
            <div class="error-content">
                <h1 class="error-code">404</h1>
                <div class="error-image">
                    <img src="https://kitpro.site/wateree/wp-content/uploads/sites/427/2025/08/16.png" alt="404 Illustration">
                </div>
                <h2 class="error-message">Desculpe... Página não encontrada!</h2>
                <p class="error-description">
                    A página que você está procurando pode ter sido removida, ter seu nome alterado ou estar temporariamente indisponível.
                </p>
                <a href="/" class="btn-home">
                    <span class="btn-text">Voltar para Início</span>
                    <span class="btn-icon"><i class="fas fa-arrow-right"></i></span>
                </a>
            </div>
        </section>
    </main>

    <site-footer></site-footer>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/components/SiteHeader.ts"></script>
    <script type="module" src="/src/components/SiteFooter.ts"></script>
</body>
</html>
